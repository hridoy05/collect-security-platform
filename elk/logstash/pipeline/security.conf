# Logstash Pipeline — Connect Security Analytics


input {
  beats { port => 5044 type => "beats" }
  tcp   { port => 5000 type => "syslog" codec => "plain" }
  http  { port => 8080 type => "app_event" codec => "json" }
}

filter {
  # FIREWALL LOGS — 
  if [type] == "syslog" or [fields][log_type] == "firewall" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{WORD:action} %{WORD:protocol} %{IP:source_ip}:%{NUMBER:source_port} -> %{IP:dest_ip}:%{NUMBER:dest_port}" }
      tag_on_failure => ["_grok_firewall_failed"]
    }
    mutate {
      add_field => { "event_type" => "firewall" }
      convert => { "source_port" => "integer" "dest_port" => "integer" }
    }
    if [dest_port] == 443 { mutate { add_field => { "service" => "HTTPS" } } }
    else if [dest_port] == 80 { mutate { add_field => { "service" => "HTTP" } } }
    else if [dest_port] == 22 { mutate { add_field => { "service" => "SSH" } } }
    else if [dest_port] == 53 { mutate { add_field => { "service" => "DNS" } } }
    else if [dest_port] == 5432 { mutate { add_field => { "service" => "PostgreSQL" } } }
    else if [dest_port] == 9200 { mutate { add_field => { "service" => "Elasticsearch" } } }
    if [dest_port] in [4444, 1337, 31337, 8888] {
      mutate { add_tag => ["suspicious_port","possible_c2"] add_field => { "severity" => "critical" } }
    }
  }

  # DNS LOGS (entropy for tunneling)
  if [fields][log_type] == "dns" or [event_type] == "dns_query" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{IP:source_ip} query %{HOSTNAME:dns_query} %{WORD:record_type}" }
      tag_on_failure => ["_grok_dns_failed"]
    }
    mutate { add_field => { "event_type" => "dns_query" } }
    ruby {
      code => '
        query = event.get("dns_query") || ""
        parts = query.split(".")
        if parts.length > 2
          subdomain = parts[0..-3].join(".")
          event.set("subdomain", subdomain)
          event.set("subdomain_length", subdomain.length)
          freq = Hash.new(0)
          subdomain.chars.each { |c| freq[c] += 1 }
          entropy = freq.values.reduce(0.0) { |e, count| p = count.to_f / subdomain.length; e - p * Math.log2(p) }
          event.set("subdomain_entropy", entropy.round(3))
          if entropy > 3.5 || subdomain.length > 40
            event.set("possible_tunneling", true)
            event.set("severity", "high")
            event.tag("dns_tunneling_suspect")
          end
        end
      '
    }
  }

  # AUTH LOGS — SIEM correlation trigger
  if [fields][log_type] == "auth" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} AUTH_%{WORD:auth_result} user=%{USERNAME:target_user} src=%{IP:source_ip}" }
      tag_on_failure => ["_grok_auth_failed"]
    }
    mutate { add_field => { "event_type" => "authentication" } }
    if [auth_result] == "FAILURE" { mutate { add_field => { "event_outcome" => "failure" "severity" => "medium" } } }
    else if [auth_result] == "SUCCESS" { mutate { add_field => { "event_outcome" => "success" "severity" => "info" } } }
  }

  # GeoIP enrichment — 
  if [source_ip] and [source_ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.)/ {
    geoip { source => "source_ip" target => "geo" }
  }

  # Timestamp normalization
  if [timestamp] { date { match => ["timestamp", "ISO8601"] target => "@timestamp" } }

  # ECS field normalization — consistent schema for SIEM
  mutate {
    rename => {
      "source_ip" => "[source][ip]"
      "dest_ip" => "[destination][ip]"
      "target_user" => "[user][name]"
    }
    add_field => { "platform" => "connect-security" }
    remove_field => ["host", "agent"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "connect-security-events-%{+YYYY.MM.dd}"
  }
  if [severity] == "critical" or "dns_tunneling_suspect" in [tags] {
    http {
      url => "http://backend:4000/api/alerts/ingest"
      http_method => "post"
      format => "json"
      content_type => "application/json"
    }
  }
}
